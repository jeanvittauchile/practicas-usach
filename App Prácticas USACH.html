<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>App Prácticas USACH</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#009688"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Prácticas"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300..900;1,300..900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/styles.css?v=2" />
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Auth guard: redirect to login if no session -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="src/firebase-config.js"></script>
  <script src="src/cloud.js"></script>
  <script>
    (function() {
      var u = getAuthUser();
      if (!u) { document.documentElement.style.display='none'; window.location.replace('Login.html'); }
      else { window.__authUser = u; }  // coordinador y profesor pueden entrar a las prácticas
    })();
  </script>

  <!-- Data + components (load in order) -->
  <script src="src/data.js"></script>
  <script src="src/data-p2.js"></script>
  <script src="src/data-p3.js"></script>
  <script src="src/data-p4.js"></script>
  <script src="src/data-p5.js"></script>
  <script src="src/data-p6.js"></script>
  <script src="src/semana-utils.js"></script>
  <script type="text/babel" src="src/icons.jsx"></script>
  <script type="text/babel" src="src/shell.jsx"></script>
  <script type="text/babel" src="src/ios-frame.jsx"></script>
  <script type="text/babel" src="src/tweaks-panel.jsx"></script>
  <script type="text/babel" src="src/screens-overview.jsx"></script>
  <script type="text/babel" src="src/screens-extra.jsx"></script>
  <script type="text/babel" src="src/screens-eval.jsx"></script>
  <script type="text/babel" src="src/screens-p2.jsx"></script>
  <script type="text/babel" src="src/screens-p3.jsx"></script>
  <script type="text/babel" src="src/screens-p4.jsx"></script>
  <script type="text/babel" src="src/screens-reports.jsx"></script>
  <script type="text/babel" src="src/settings-modals.jsx"></script>
  <script type="text/babel" src="src/mobile.jsx"></script>
  <script type="text/babel" src="src/screens-visitas.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
